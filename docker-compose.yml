version: '3.8'

services:
  web:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fracto_user:fracto_password@db:5432/fracto_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    networks:
      - fracto-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - fracto-network

  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=fracto_db
      - POSTGRES_USER=fracto_user
      - POSTGRES_PASSWORD=fracto_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fracto-network

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fracto-network

  worker:
    build: ./backend
    command: celery -A app.core.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://fracto_user:fracto_password@db:5432/fracto_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    networks:
      - fracto-network

volumes:
  postgres_data:
  redis_data:

networks:
  fracto-network:
    driver: bridge